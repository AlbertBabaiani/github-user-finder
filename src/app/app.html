<header>
  <app-header [isDark]="isDark()" (changeTheme)="changeTheme($event)" />
</header>

<main>
  <app-search (searchUser)="searchUser($event)" />

  @if (searched_user()) {
    <app-user-info @fadeInOut [user]="searched_user()" />
  }
</main>

@if (isLoading()) {
  <div class="loading-overlay">
    <span class="loader"></span>
  </div>
}
